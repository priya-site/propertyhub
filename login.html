<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - Property Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: "#0A192F",
                        deepnavy: "#112240",
                        royal: "#6A0DAD",
                        lightroyal: "#8A2BE2",
                        card: "#F3F4F6"
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .login-bg {
            background-image: url("https://images.pexels.com/photos/323780/pexels-photo-323780.jpeg");
            background-size: cover;
            background-position: center;
        }
    </style>

</head>

<body class="bg-white text-navy">

    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Main Section -->
    <div class="flex items-center justify-center min-h-[90vh] sm:min-h-screen px-4 py-6">

        <div class="w-full max-w-5xl bg-card rounded-2xl sm:rounded-3xl overflow-hidden shadow-2xl border border-lightroyal">

            <div class="flex flex-col md:flex-row">

                <!-- LEFT SIDE WITH IMAGE -->
                <div class="hidden md:flex md:w-1/2 relative login-bg">

                    <!-- Overlay -->
                    <div class="absolute inset-0 bg-gradient-to-br from-royal/80 to-lightroyal/60"></div>

                    <!-- Content -->
                    <div class="relative z-10 flex items-center justify-center p-6 md:p-10 text-white text-center">
                        <div>
                            <h1 class="text-2xl md:text-4xl font-bold mb-4 drop-shadow-lg">
                                Welcome Back
                            </h1>
                            <p class="text-sm md:text-base text-gray-100 drop-shadow-md">
                                Login to manage your properties and explore premium listings with Property Hub.
                            </p>
                        </div>
                    </div>

                </div>

                <!-- RIGHT SIDE FORM -->
                <div class="w-full md:w-1/2 p-6 sm:p-8 md:p-10 bg-white">

                    <h2 class="text-2xl sm:text-3xl font-bold text-royal mb-6 sm:mb-8 text-center">
                        Login to Your Account
                    </h2>

                    <div id="successMsg" 
     class="hidden bg-green-100 text-green-700 px-4 py-3 rounded-lg mb-4 text-center text-sm sm:text-base">
    ✅ Signup successful! Please login.
</div>

                    <form action="login.php" method="POST" class="space-y-5 sm:space-y-6">

                        <!-- Role -->
                        <div>
                            <select name="role" id="loginRole"
                                class="w-full p-3 rounded-xl border border-gray-300 
                                focus:outline-none focus:ring-2 focus:ring-royal 
                                focus:border-royal transition text-sm sm:text-base">
                                <option value="" disabled selected hidden>I am a...</option>
                                <option value="user">User</option>
                                <option value="owner">Owner</option>
                                <option value="broker">Broker</option>
                            </select>
                            <p id="roleError" class="text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <!-- Email -->
                        <div class="relative">
                            <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
                            <input type="email" name="email" id="loginEmail" placeholder="Email"
                                class="w-full pl-12 p-3 rounded-xl border border-gray-300 
                                focus:outline-none focus:ring-2 focus:ring-royal 
                                focus:border-royal transition text-sm sm:text-base">
                            <p id="emailError" class="text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <!-- Password -->
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                            <input type="password" name="password" id="loginPassword" placeholder="Password"
                                class="w-full pl-12 p-3 rounded-xl border border-gray-300 
                                focus:outline-none focus:ring-2 focus:ring-royal 
                                focus:border-royal transition text-sm sm:text-base">
                            <p id="passwordError" class="text-red-500 text-sm mt-1 hidden"></p>
                        </div>

                        <!-- Button -->
                        <button type="submit"
                            class="w-full bg-royal text-white py-3 rounded-xl font-semibold 
                            hover:bg-lightroyal transition duration-300 shadow-md hover:shadow-lg">
                            Login
                        </button>

                    </form>

                    <p class="mt-6 sm:mt-8 text-center text-gray-600 text-sm sm:text-base">
                        Don't have an account?
                        <a href="signup.html"
                            class="text-royal underline ml-1 hover:text-lightroyal font-medium">
                            Sign Up
                        </a>
                    </p>

                </div>

            </div>

        </div>

    </div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script>
const params = new URLSearchParams(window.location.search);

if (params.get("signup") === "success") {
    document.getElementById("successMsg").classList.remove("hidden");
}
</script>

    <script src="js/loadNavbar.js"></script>
    <script src="js/login.js"></script>
    <script src="js/loadFooter.js"></script>

</body>

</html>
